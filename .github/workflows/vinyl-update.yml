name: Latest vinyl workflow
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vinyl-svg:
    name: Regenerate img/vinyl/ tiles from russ.fm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet Pillow

      - name: Render per-record SVGs
        run: python3 scripts/render_vinyl_svg.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain img/vinyl README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add img/vinyl README.md
            git commit -m "🎵 Regenerated vinyl tiles with latest records"
            git push
          else
            echo "No changes to vinyl tiles"
          fi

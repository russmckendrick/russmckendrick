name: Latest vinyl workflow
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-vinyl:
    name: Update this repo's README with latest vinyl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch collection.json
        run: curl -fsSL https://www.russ.fm/collection.json -o collection.json

      - name: Render vinyl grid
        run: |
          jq -r '
            def esc_attr: gsub("\""; "&quot;");
            def esc_cell: gsub("\\|"; "\\\\|");
            sort_by(.date_added) | reverse | .[0:5]
            | "| " + (map(
                "<a href=\"https://www.russ.fm" + .uri_release + "\">"
                + "<img src=\"https://assets.russ.fm" + .images_uri_release.medium + "\" "
                + "alt=\"" + (.release_name | esc_attr) + " by " + (.release_artist | esc_attr) + "\" "
                + "width=\"180\"/></a>"
              ) | join(" | ")) + " |\n"
              + "|" + (map(":---:") | join("|")) + "|\n"
              + "| " + (map(
                "<sub><b>" + (.release_name | esc_cell) + "</b><br/>"
                + (.release_artist | esc_cell) + "</sub>"
              ) | join(" | ")) + " |"
          ' collection.json > vinyl.md

      - name: Update README between markers
        run: |
          python3 - <<'PY'
          import pathlib, re
          readme = pathlib.Path("README.md")
          vinyl = pathlib.Path("vinyl.md").read_text()
          text = readme.read_text()
          pattern = re.compile(
              r"(<!-- VINYL-LIST:START -->)(.*?)(<!-- VINYL-LIST:END -->)",
              re.DOTALL,
          )
          new_block = f"<!-- VINYL-LIST:START -->\n{vinyl}\n<!-- VINYL-LIST:END -->"
          updated, n = pattern.subn(new_block, text)
          if n == 0:
              raise SystemExit("VINYL-LIST markers not found in README.md")
          readme.write_text(updated)
          PY

      - name: Clean up
        run: rm -f collection.json vinyl.md

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "🎵 Updated README with latest vinyl"
            git push
          else
            echo "No changes to README.md"
          fi

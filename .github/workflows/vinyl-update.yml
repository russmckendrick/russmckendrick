name: Latest vinyl workflow
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vinyl-svg:
    name: Regenerate img/vinyl.svg from russ.fm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet Pillow

      - name: Render vinyl.svg
        run: python3 scripts/render_vinyl_svg.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain img/vinyl.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add img/vinyl.svg
            git commit -m "🎵 Regenerated vinyl.svg with latest records"
            git push
          else
            echo "No changes to img/vinyl.svg"
          fi

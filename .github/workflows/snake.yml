name: Contribution snake
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: russmckendrick
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Move into img/
        run: |
          mkdir -p img
          mv dist/github-snake.svg img/github-snake.svg
          mv dist/github-snake-dark.svg img/github-snake-dark.svg

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain img/github-snake.svg img/github-snake-dark.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add img/github-snake.svg img/github-snake-dark.svg
            git commit -m "🐍 Regenerated contribution snake"
            git push
          else
            echo "No changes to snake svgs"
          fi

name: Latest blog post workflow
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog-svg:
    name: Regenerate img/blog/ tiles from russ.cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet Pillow

      - name: Render per-post SVGs
        run: python3 scripts/render_blog_svg.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain img/blog README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add img/blog README.md
            git commit -m "🤖 Regenerated blog tiles with latest posts"
            git push
          else
            echo "No changes to blog tiles"
          fi
